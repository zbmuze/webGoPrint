name: GoReleaser

on:
  push:
    tags:
      - 'v*' # 仅当推送以'v'开头的标签时触发工作流
  workflow_dispatch: # 允许手动触发工作流

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 检出完整的提交历史，这对生成变更日志很重要

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21' # 建议使用您项目所需的Go版本

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v2
        with:
          distribution: goreleaser
          version: latest # 建议固定一个版本，例如 'v1.22.1'
          args: release --clean # 清理dist目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
