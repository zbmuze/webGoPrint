name: GoReleaser

on:
  push:
    tags:
      - 'v*'  # 仅推送v开头标签时触发正式发布
  workflow_dispatch:  # 手动触发，默认执行快照测试

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: 检查代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 设置Go环境
        uses: actions/setup-go@v5  # 升级到v5，消除Node.js废弃警告
        with:
          go-version: 'stable'  # 自动使用最新稳定版Go，也可固定为 '1.23' 等
          check-latest: true
          
      - name: 运行GoReleaser 编译发布
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          # 区分正式发布和快照模式：有tag则正式发布，手动触发则快照
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'release --clean --snapshot' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
