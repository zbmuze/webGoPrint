version: 2

project_name: print-server

builds:
  - main: .
    binary: print-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.buildTime={{ .Date }}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  exclude:
    - '^docs:'
    - '^test:'
    - '^ci:'

release:
  prerelease: auto
  draft: false
